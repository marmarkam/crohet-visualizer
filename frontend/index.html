{% extends "layout.html" %}

{% block title %}Crochaid - Pattern Visualizer{% endblock %}

{% block content %}
<div class="app-container">
    <div class="viewer-panel" id="viewer-panel">
        <div id="canvas-container"></div>
    </div>

    <div class="divider" id="divider"></div>

    <div class="input-panel" id="input-panel">
        <h2>Pattern Input</h2>
        <form id="pattern-form">
            <div class="pattern-name-container">
                <input type="text" id="pattern-name" placeholder="Pattern Name">
            </div>
            <!--round/segment inputs -->
            <div class="round" data-round="1">
                <span class="round-number">1.</span>
                <div class="segments">
                    <div class="segment">
                        <input type="text" class="segment-input" placeholder="sc 6">
                        <input type="number" class="repeat-input" value="1" min="1">
                        <button class="add-segment-btn">+</button>
                        <button class="remove-segment-btn">-</button>
                    </div>
                </div>
                <button class="remove-round-btn">Remove</button>
            </div>
            <button id="add-round-btn">Add Round</button>

        </form>
    </div>
</div> 
{% endblock %}

{% block scripts %}
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="{{ url_for('static', filename='js/resizable.js') }}"></script>
<script src="{{ url_for('static', filename='js/viewer.js') }}"></script>
<script src="{{ url_for('static', filename='js/form.js') }}"></script>
{% endblock %}
